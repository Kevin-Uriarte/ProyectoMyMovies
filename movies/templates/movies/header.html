{% load static %}
<nav class="border-b border-slate-200 bg-gradient-to-r from-slate-950 via-slate-900 to-sky-950 shadow-[0_12px_40px_rgba(15,23,42,0.28)]">
  <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
      <div class="flex items-center justify-between gap-4">
        <a href="/" class="flex items-center gap-3">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/10 ring-1 ring-white/15 backdrop-blur">
            <img class="h-8 w-auto" src="{% static 'movies/film.png' %}" alt="logo">
          </div>
          <div>
            <p class="text-xs uppercase tracking-[0.35em] text-sky-300/80">Cinema Journal</p>
            <p class="text-xl font-semibold text-white">My Movies</p>
          </div>
        </a>

        <div class="flex items-center gap-2 lg:hidden">
          {% if user.is_authenticated %}
          <a href="{% url 'user_reviews' %}"
             class="rounded-full border border-white/15 px-3 py-2 text-sm font-medium text-slate-100 transition hover:border-sky-300/40 hover:bg-white/10">
            Mis reseñas
          </a>
          {% endif %}
        </div>
      </div>

      <div class="flex flex-col gap-4 lg:flex-1 lg:flex-row lg:items-center lg:justify-end">
        <div class="hidden lg:flex lg:items-center lg:gap-2">
          <a href="/"
             class="rounded-full px-4 py-2 text-sm font-medium transition {% if request.path == '/' %}bg-white text-slate-900 shadow-lg{% else %}text-slate-200 hover:bg-white/10 hover:text-white{% endif %}">
            Inicio
          </a>
          {% if user.is_authenticated %}
          <a href="{% url 'user_reviews' %}"
             class="rounded-full px-4 py-2 text-sm font-medium transition {% if request.path == '/movies/my-reviews/' %}bg-sky-400 text-slate-950 shadow-lg{% else %}text-slate-200 hover:bg-white/10 hover:text-white{% endif %}">
            Mis reseñas
          </a>
          {% endif %}
        </div>

        <form method="get" action="/movies/search/" class="w-full lg:max-w-md">
          <label for="search" class="sr-only">Buscar</label>
          <div class="relative">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
              <svg class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" />
              </svg>
            </div>
            <input id="search"
                   name="search"
                   type="search"
                   required
                   value="{{ request.GET.search|default:'' }}"
                   placeholder="Busca peliculas, actores o ideas para ver"
                   class="block w-full rounded-2xl border border-white/10 bg-white/95 py-3 pl-11 pr-28 text-sm text-slate-900 shadow-[0_10px_30px_rgba(15,23,42,0.18)] placeholder:text-slate-400 focus:border-sky-400 focus:outline-none focus:ring-4 focus:ring-sky-300/30">
            <button type="submit"
                    class="absolute inset-y-1.5 right-1.5 rounded-xl bg-sky-500 px-4 text-sm font-semibold text-slate-950 transition hover:bg-sky-400">
              Buscar
            </button>
          </div>
        </form>

        <div class="flex items-center gap-2 lg:ml-2">
          {% if user.is_authenticated %}
          <div class="hidden rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm text-slate-200 lg:block">
            Hola, <span class="font-semibold text-white">{{ user.username }}</span>
          </div>
          <a href="/users/logout"
             class="rounded-full border border-sky-300/30 px-4 py-2 text-sm font-semibold text-sky-200 transition hover:bg-sky-400/10 hover:text-white">
            Cerrar sesión
          </a>
          {% else %}
          <a href="/users/register"
             class="rounded-full border border-white/15 px-4 py-2 text-sm font-semibold text-slate-100 transition hover:bg-white/10 hover:text-white">
            Regístrate
          </a>
          <a href="/users/login"
             class="rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-900 transition hover:bg-sky-100">
            Inicia sesión
          </a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</nav>
