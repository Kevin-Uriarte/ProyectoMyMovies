{% extends "movies/base.html" %}

{% block content %}
<div class="container mx-auto px-5 py-2 lg:px-32 lg:pt-12">

  <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6">En Cartelera</h1>

  <div id="artworks-container" class="-m-1 flex flex-wrap md:-m-2">
    {% for movie in movies %}
    <div class="flex w-1/2 sm:w-1/3 lg:w-1/4 flex-wrap pt-3 px-1">
      <a href="/movies/{{ movie.id }}/" class="w-full">
        <img class="block w-full rounded-lg object-cover object-center shadow hover:opacity-90 transition"
             src="https://image.tmdb.org/t/p/w400{{ movie.poster_path }}"
             alt="{{ movie.title }}" loading="lazy" />
      </a>
      <div class="w-full mt-2 mb-5 px-1">
        <a href="/movies/{{ movie.id }}/"
           class="block text-sky-600 dark:text-sky-400 font-bold text-sm leading-tight hover:underline">
          {{ movie.title|truncatechars:36 }}
        </a>
        <span class="text-gray-400 text-xs">{{ movie.release_date }}</span>
      </div>
    </div>
    {% endfor %}
  </div>

  <!-- Paginación -->
  <div class="flex justify-center gap-4 mt-10 mb-6">
    {% if page > 1 %}
    <a href="?page={{ page|add:"-1" }}"
       class="rounded-md bg-gray-200 dark:bg-slate-700 px-4 py-2 text-sm font-semibold text-gray-700 dark:text-gray-200 hover:bg-gray-300">
      ← Anterior
    </a>
    {% endif %}
    <span class="flex items-center text-sm text-gray-500">Página {{ page }}</span>
    <a href="?page={{ page|add:"1" }}"
       class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">
      Siguiente →
    </a>
  </div>

</div>
{% endblock content %}
