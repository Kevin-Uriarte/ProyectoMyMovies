<div id="modal" _="on closeModal remove me"
    class="relative z-10" role="dialog" aria-modal="true">
  <div class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm"></div>
  <div class="fixed inset-0 z-10 overflow-y-auto">
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="relative w-full max-w-2xl rounded-[2rem] border border-white/10 bg-gradient-to-br from-slate-950 via-slate-900 to-sky-950 p-7 text-slate-100 shadow-[0_32px_100px_rgba(15,23,42,0.5)]">

        <p class="text-xs uppercase tracking-[0.3em] text-sky-300/80">Movie Review</p>
        <h2 class="mt-3 text-2xl font-bold text-white">Agregar Reseña</h2>
        <p class="mt-1 text-sm text-slate-300">
          {% if tmdb %}{{ tmdb.title }}{% elif movie %}{{ movie.title }}{% endif %}
        </p>

        <form hx-post="{% url 'add_review' movie_id %}"
              hx-target="#modal" hx-swap="outerHTML"
              class="mt-6 space-y-5">
          {% csrf_token %}
          {% for field in movie_review_form %}
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-200">
              {{ field.label }}
            </label>
            {{ field }}
            {% if field.errors %}
            <p class="mt-2 text-xs font-medium text-rose-300">{{ field.errors|join:", " }}</p>
            {% endif %}
          </div>
          {% endfor %}

          <div class="flex justify-end gap-3 pt-3">
            <button type="button" _="on click trigger closeModal"
                    class="rounded-full border border-white/15 px-5 py-3 text-sm font-semibold text-slate-200 transition hover:bg-white/10 hover:text-white">
              Cancelar
            </button>
            <button type="submit"
                    class="rounded-full bg-sky-400 px-6 py-3 text-sm font-semibold text-slate-950 transition hover:bg-sky-300">
              Guardar reseña
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
